name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['18', '20', '22']
    name: Node ${{ matrix.node }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}

      - name: Install dependencies (frozen lockfile)
        run: npm ci

      - name: CLI parses + prints usage
        run: node bin/llama.mjs --help

      - name: CLI module loads cleanly
        run: node --check bin/llama.mjs

      - name: MCP server module loads cleanly
        run: node --check bin/llama-mcp.mjs

      - name: MCP server boots + lists named tools (no generic API passthrough)
        run: |
          OUT=$(printf '%s\n' \
            '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci-smoke","version":"1.0.0"}}}' \
            '{"jsonrpc":"2.0","method":"notifications/initialized"}' \
            '{"jsonrpc":"2.0","id":2,"method":"tools/list"}' \
            | node bin/llama-mcp.mjs)
          echo "$OUT"
          echo "$OUT" | grep -q '"name":"auth_status"'
          echo "$OUT" | grep -q '"name":"deal_search"'
          echo "$OUT" | grep -q '"name":"deal_create"'
          echo "$OUT" | grep -q '"name":"brief_add_text"'
          echo "$OUT" | grep -q '"name":"wiki_search"'
          echo "$OUT" | grep -q '"name":"timeline"'
          echo "$OUT" | grep -q '"name":"pitch_start"'
          # Regression test: the MCP server must expose only named, typed
          # tools — no generic API passthrough. Hard-fail the build if a
          # passthrough tool ever shows up in tools/list.
          if echo "$OUT" | grep -q '"name":"llama_api"'; then
            echo "FAIL: generic API passthrough tool resurfaced."
            exit 1
          fi

      - name: Pack tarball + verify file allowlist
        run: |
          npm pack --silent
          tar -tzf llamaventures-cli-*.tgz | sort > /tmp/contents.txt
          echo "--- tarball contents ---"
          cat /tmp/contents.txt
          # Hard-fail if anything from .github/, node_modules/, .env*, *.tgz leaks
          ! grep -q '^package/\.github' /tmp/contents.txt
          ! grep -q 'node_modules' /tmp/contents.txt
          ! grep -q '\.env' /tmp/contents.txt

      - name: Hygiene guard — denylist scan of the publish surface
        # Secret is absent on fork PRs; the script warns and passes there.
        # The publish workflow runs the same scan as a hard gate.
        env:
          REDACTION_DENYLIST: ${{ secrets.REDACTION_DENYLIST }}
        run: node scripts/verify-tarball-clean.mjs
