name: Publish

# Triggered when a GitHub Release is published. The release tag (e.g.
# v1.0.0) determines which commit is published; the version in
# package.json must match. We publish via npm Trusted Publishers (OIDC) —
# no NPM_TOKEN is stored in repo secrets, no npm-level credential is
# available to leak from CI even briefly.

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write  # required for npm OIDC -> Trusted Publishers exchange

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm-publish  # gates on environment-protection rules
    steps:
      - uses: actions/checkout@v7
        with:
          # Check out the exact commit the release tag points at, not main.
          ref: ${{ github.event.release.tag_name }}

      - uses: actions/setup-node@v6
        with:
          # Node 24 ships with npm 11.5.1+, required for the new OIDC
          # handshake that Trusted Publishers needs. Node 20/22<14 ships
          # npm 10, which silently fails the handshake → registry treats
          # the request as anonymous → misleading 404 on PUT. See
          # npm/cli#8730, npm/cli#8678.
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies (frozen lockfile)
        run: npm ci

      - name: Identifier guard — block known leak shapes from publish
        run: |
          # Block publish if any known-sensitive identifier shape slipped into
          # files that go into the tarball (bin/, lib/, root .md). The pattern
          # is intentionally narrow: it targets internal naming conventions
          # that should never appear in a public artifact. Extend as new
          # patterns surface.
          PATTERN='\bvirtual-[a-z][a-z-]+\b|\b[a-z]+_analysis\b'
          MATCHES=$(grep -rE "$PATTERN" bin/ lib/ *.md 2>/dev/null || true)
          if [ -n "$MATCHES" ]; then
            echo "FAIL: publish blocked — sensitive identifier shape detected:"
            echo "$MATCHES"
            exit 1
          fi
          echo "OK: no leak-shape identifiers detected"

      - name: Hygiene guard — denylist scan of the publish surface
        env:
          REDACTION_DENYLIST: ${{ secrets.REDACTION_DENYLIST }}
        run: node scripts/verify-tarball-clean.mjs

      - name: Sanity — package.json version matches release tag
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG="${{ github.event.release.tag_name }}"
          # Strip leading 'v' if present
          TAG="${TAG#v}"
          if [ "$PKG_VERSION" != "$TAG" ]; then
            echo "ERROR: package.json version ($PKG_VERSION) != release tag ($TAG)"
            exit 1
          fi
          echo "OK: $PKG_VERSION matches release tag"

      - name: Publish to npm with provenance
        run: npm publish --provenance --access public
